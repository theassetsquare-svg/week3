<main class="section"><div class="section-inner" style="font-size:16px;color:#333;line-height:1.8;"><h2 style="font-size:20px;font-weight:800;margin-bottom:16px;">N빵 계산기</h2><p style="margin-bottom:16px;">총 금액과 인원수를 입력하면 1인당 금액을 자동 계산합니다.</p><div style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:16px;padding:24px;"><div style="margin-bottom:12px;"><label style="font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:4px;">총 금액 (원)</label><input type="number" id="calcTotal" placeholder="예: 500000" style="width:100%;padding:12px;border:1px solid #D1D5DB;border-radius:12px;font-size:16px;font-family:inherit;"/></div><div style="margin-bottom:12px;"><label style="font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:4px;">인원수</label><input type="number" id="calcPeople" placeholder="예: 5" style="width:100%;padding:12px;border:1px solid #D1D5DB;border-radius:12px;font-size:16px;font-family:inherit;"/></div><button id="calcBtn" style="width:100%;padding:14px;background:#8B5CF6;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:inherit;">계산하기</button><div id="calcResult" style="margin-top:16px;text-align:center;font-size:24px;font-weight:900;color:#8B5CF6;min-height:36px;"></div></div><script>document.getElementById("calcBtn").addEventListener("click",function(){var t=parseInt(document.getElementById("calcTotal").value)||0;var p=parseInt(document.getElementById("calcPeople").value)||1;if(p<1)p=1;document.getElementById("calcResult").textContent="1인당 "+Math.ceil(t/p).toLocaleString()+"원";});</script></div></main>
